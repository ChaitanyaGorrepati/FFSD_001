<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivicTrack – Login</title>
  <link rel="stylesheet" href="/FFSD_001/FFSD_testing/Front-end/css/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="auth-shell">

    <!-- LEFT: decorative mockup -->
    <div class="auth-deco">
      <div class="deco-card">
        <div class="deco-topbar">
          <div class="deco-sidebar">
            <div class="deco-logo-block"></div>
            <div class="deco-nav-item active"></div>
            <div class="deco-nav-item"></div>
            <div class="deco-nav-item"></div>
            <div class="deco-nav-item"></div>
          </div>
          <div class="deco-content">
            <div class="deco-header-bar"></div>
            <div class="deco-stat-row">
              <div class="deco-stat red"></div>
              <div class="deco-stat"></div>
              <div class="deco-stat"></div>
            </div>
            <div class="deco-table">
              <div class="deco-row header"></div>
              <div class="deco-row"></div>
              <div class="deco-row"></div>
              <div class="deco-row"></div>
              <div class="deco-row short"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: login form -->
    <div class="auth-panel">
      <div class="auth-box">

        <div class="auth-nav">
          <div class="auth-brand">
            <span class="brand-dot"></span>
            <span>CivicTrack</span>
          </div>
          <a href="role-selection.html" class="back-link">← Back</a>
        </div>

        <div class="auth-body">
          <h2 class="auth-title">Login to CivicTrack</h2>
          <p class="auth-sub">
            Continue as <span id="role-display" class="role-highlight">—</span>
            <span id="role-id-display" class="role-id-hint"></span>
          </p>

          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input
                type="text"
                id="username"
                placeholder="Enter your username"
                autocomplete="off"
              />
            </div>
            <p id="username-error" class="field-error hidden">Username is required.</p>
          </div>

          <button class="btn-primary full" id="login-btn">Continue to Dashboard</button>

          <p class="auth-note">By logging in, you agree to CivicTrack's terms of service and privacy policy.</p>
        </div>

      </div>
    </div>
  </div>

<script type="module" src="../js/login.js"></script>
</body>
</html>
